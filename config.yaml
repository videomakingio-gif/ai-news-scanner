# ============================================================
# AI News Scanner — Configuration
# ============================================================
# Personalizza fonti, scoring e output per il tuo caso d'uso.
# Copia questo file e modifica a piacere.
# ============================================================

# --- Scoring ---
scoring:
  # Provider LLM: "anthropic" (default), "openai", o "gemini"
  provider: "anthropic"

  model: "claude-haiku-4-5-20251001"   # Modello per lo scoring (Haiku = economico e veloce)
  # Per OpenAI: "gpt-4o-mini" | Per Gemini: "gemini-2.0-flash"
  threshold: 7                          # Salva solo articoli con score >= threshold (1-10)
  max_tokens: 100                       # Max token per risposta scoring

  # Profilo di rilevanza: descrive CHI sei e COSA ti interessa.
  # Claude usa questo profilo per assegnare punteggi.
  # Personalizzalo per il tuo dominio.
  profile: |
    Sei un filtro di rilevanza per un AI Automation Architect che lavora con
    Claude, Python e Google Cloud per automatizzare processi B2B per PMI
    e freelancer italiani.

    Criteri di rilevanza alta (8-10):
    - Novita' su Claude, Anthropic, Claude Code, MCP, Agents
    - Automazione AI applicata a business reali (non ricerca accademica)
    - AI Act, regolamentazione AI in Europa/Italia
    - Case study di implementazione AI in PMI
    - Tool e workflow per freelancer/solopreneur con AI

    Criteri di rilevanza media (5-7):
    - Novita' su altri LLM (GPT, Gemini, Llama) con applicazioni pratiche
    - Trend AI che impattano il mercato italiano
    - Cloud computing, serverless, deploy

    Criteri di rilevanza bassa (1-4):
    - Ricerca accademica pura senza applicazione pratica
    - Hype generico senza sostanza
    - News corporate (funding round, assunzioni) senza impatto operativo

