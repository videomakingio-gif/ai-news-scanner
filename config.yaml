# --- Fetch ---
fetch:
  max_articles_per_source: 5    # Max articoli per fonte per scan
  hours_lookback: 26            # Cattura articoli delle ultime N ore
  timeout_seconds: 10           # Timeout per fetch RSS
  user_agent: "AINewsScanner/1.0"

# --- Storage ---
storage:
  # Supporta "gcs" (Google Cloud Storage) o "local" (file system)
  backend: "gcs"

  # Google Cloud Storage
  gcs_bucket: "gl-ai-news"
  gcs_prefix: "scans"

  # Local (alternativa per dev/test)
  local_path: "./output"

  # Dedup: controlla gli ultimi N giorni
  dedup_days: 3

# --- Output ---
output:
  # Formato output: "json" o "markdown"
  format: "json"

  # Genera anche un file latest.json con l'ultimo scan
  write_latest: true

# --- Notifications ---
# Notifiche opzionali dopo ogni scan (solo se ci sono articoli rilevanti)
notifications:

  # Telegram: invia i risultati a un bot Telegram
  # 1. Crea un bot con @BotFather e ottieni il token
  # 2. Avvia il bot e ottieni il chat_id con https://api.telegram.org/bot<TOKEN>/getUpdates
  telegram:
    enabled: false
    bot_token: ""            # Oppure usa env: TELEGRAM_BOT_TOKEN
    chat_id: ""              # Oppure usa env: TELEGRAM_CHAT_ID

  # Slack: invia i risultati a un canale Slack via webhook
  # Crea un webhook: https://api.slack.com/messaging/webhooks
  slack:
    enabled: false
    webhook_url: ""          # Oppure usa env: SLACK_WEBHOOK_URL
